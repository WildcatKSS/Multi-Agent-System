[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mas"
version = "0.0.1"
description = "Multi-Agent System — MVP scaffold"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.12"
authors = [{ name = "WildcatKSS" }]
keywords = ["multi-agent", "mas", "mvp"]
classifiers = [
    "Development Status :: 1 - Planning",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]
dependencies = [
    "redis>=5.0",  # Redis client for working memory
]

[project.optional-dependencies]
dev = ["pytest>=8"]
memory = ["redis>=5.0"]  # Optional memory layer

[project.scripts]
mas = "mas.cli:main"

[project.urls]
Homepage = "https://github.com/WildcatKSS/Multi-Agent-System"
Issues = "https://github.com/WildcatKSS/Multi-Agent-System/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/mas"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
