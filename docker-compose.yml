# Multi-Agent System: Example Deployment
# Version: 2.0.0
# Usage: docker-compose up -d

services:
  # Multi-Agent System runtime
  mas:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mas-runtime
    image: mas:2.0.0
    environment:
      # Logging (read by the standard logging configuration).
      LOG_LEVEL: INFO
      # Redis password — must match the value configured on the redis service.
      # Pass it to WorkingMemoryConfig(password=os.environ["REDIS_PASSWORD"])
      # in your application code to authenticate against the Redis instance.
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dev-change-in-production}
      # NOTE: The variables below are NOT yet read by the application.
      # Guardrails are configured in code via GuardrailsConfig, and the Redis
      # backend is configured via WorkingMemoryConfig. They are listed here as a
      # placeholder for planned env-driven configuration — remove or wire up
      # before relying on them.
      # MAS_MAX_COST: "100.0"
      # MAS_MAX_DURATION_SECONDS: "300"
      # MAS_MAX_RETRIES_PER_RUN: "10"
      # MAS_MAX_PLAN_DEPTH: "20"
      # MAS_REDIS_HOST: "redis"
      # MAS_REDIS_PORT: "6379"
    # No ports are exposed: the project ships no network/API server yet
    # (a REST API is on the v2.0.0 roadmap).
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mas-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import mas; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Redis for optional memory layer
  redis:
    image: redis:7-alpine
    container_name: mas-redis
    # Bind to loopback only — not exposed on external interfaces.
    # Set REDIS_PASSWORD in your environment before running docker-compose.
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-dev-change-in-production}
    volumes:
      - redis-data:/data
    networks:
      - mas-network
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-dev-change-in-production}"
    healthcheck:
      # $$REDIS_PASSWORD is expanded at container runtime from the env var above.
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  mas-network:
    driver: bridge

volumes:
  redis-data:
    driver: local

# Example usage:
#
# Build and start services:
#   docker-compose up -d
#
# View logs:
#   docker-compose logs -f mas
#   docker-compose logs -f redis
#
# Run tests inside container:
#   docker-compose exec mas pytest -v
#
# Access Python REPL:
#   docker-compose exec mas python
#
# Stop and clean up:
#   docker-compose down
#   docker-compose down -v  # Also remove volumes
